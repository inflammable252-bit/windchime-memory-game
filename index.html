<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
    <script src="index.js" defer></script>
    <title>Windchime Memory Game Practice</title>

    <!-- Windchime svg: https://www.behance.net/kavyas-->
</head>
<body>
    <main>
        <article class="ui" id="rune-box">
            <div class="rune" id="rune1"></div>
            <div class="rune" id="rune2"></div>
            <div class="rune" id="rune3"></div>
            <div class="rune" id="rune4"></div>
            <div class="rune" id="rune5"></div>
        </article>
        <div id="windchime">
            <div id="current-icon"></div>
            <img src="./windchime.svg" alt="An ominous windchime">
        </div>
        <div class="ui" id="picker">
            <button class="rune-button" id="X"></button>
            <button class="rune-button" id="triangle"></button>
            <button class="rune-button" id="diamond"></button>
            <button class="rune-button" id="T"></button>
            <button class="rune-button" id="circle"></button>
        </div>
        <p id="alert">Test</p>
    </main>
    <nav>
        <button id="restart">Restart</button>
        <div id="mode-wrapper">
            <button class="modes">Normal</button><button class="modes">Mythic</button><button class="modes" id="wipe">Wipe Factory</button>
        </div>
        <aside id = "message-area"><p id="message">testing wow</p></aside>
    </nav>
    
</body>
</html>
